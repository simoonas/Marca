name: Tagged lint
on:
  push:
    branches: [ main, master ]

jobs:
  qa:
    name: Code Quality
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
    steps:
      - uses: actions/checkout@v4

      - name: Install Runtime and SDK
        run: |
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.gnome.Sdk//50 org.gnome.Platform//50 org.freedesktop.Sdk.Extension.rust-stable//25.08

      - name: Build Manifest Dependencies
        run: |
          flatpak-builder --user --disable-rofiles-fuse --stop-at=marca --force-clean build_dir io.github.simoonas.marca.json

      - name: Run Clippy
        run: |
          flatpak-builder --run build_dir io.github.simoonas.marca.json cargo clippy -- -D warnings

      - name: Check Formatting
        run: |
          flatpak-builder --run build_dir io.github.simoonas.marca.json cargo fmt --check
