name: Tagged lint
on:
  push:
    branches: [ main, master ]

jobs:
  qa:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:resolute
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y build-essential libgtk-4-dev libadwaita-1-dev curl libssl-dev

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Lint clippy
        run: cargo clippy --all --no-deps -- -D warnings

      - name: Lint fmt
        run: cargo fmt --all -- --check

  verify-build:
    name: Verify Flatpak Build
    needs: qa
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --user 0:0 --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Test Build
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: io.github.simoonas.marca.json
          cache: true
